name: Deploy Study Guide to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: study-guide/yarn.lock
          enable-corepack: true

      - name: Install dependencies
        working-directory: study-guide
        run: yarn install --immutable

      - name: Run tests
        working-directory: study-guide
        run: yarn test

  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: study-guide/yarn.lock
          enable-corepack: true

      - name: Sync generated books into app public folder
        run: |
          rm -rf study-guide/public/books
          cp -r books study-guide/public/books

      - name: Install dependencies
        working-directory: study-guide
        run: yarn install --immutable

      - name: Build app
        working-directory: study-guide
        run: yarn build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: study-guide/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
